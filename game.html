<!DOCTYPE html>
<html lang="cs">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Kdo nasbírá víc hub – JS verze</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Zákaz scrollování */
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed; /* Fixuje pozici na mobilu */
    }
    canvas {
        /* Kaboom si velikost pořeší přes letterbox, my jen zakážeme gesta */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
</style>


</head>
<body>
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>
    <script src="game.js"></script>
</body>
</html>
