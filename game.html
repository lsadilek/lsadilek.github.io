<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Kdo nasbírá víc hub – JS verze</title>

    <style>
        /* Celá stránka – fix proti posunu */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            touch-action: none;
        }

        /* Kontejner držící přesný poměr stran */
        #game-container {
            width: 100vw;
            max-width: 800px;
            aspect-ratio: 800 / 600;
            position: relative;
        }

        /* Canvas přesně vyplní kontejner */
        #game-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="game"></canvas>
    </div>

    <!-- Kaboom -->
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>

    <!-- Tvoje hra -->
    <script src="game.js"></script>

</body>
</html>
