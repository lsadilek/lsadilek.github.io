<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kdo nasbírá víc hub – JS verze</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            overscroll-behavior: none;
            font-family: sans-serif;
        }

        /* Kontejner již nemá dynamické vh/vw, rozměry mu natvrdo vnutí skript v px */
        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            box-sizing: border-box;
        }

        /* Canvas drží striktní poměr 4:3 a vyplní zafixovaný kontejner */
        #game {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            aspect-ratio: 4 / 3;
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Upozornění na otočení telefonu */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            color: white;
            z-index: 9999;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 1.5rem;
            padding: 20px;
            box-sizing: border-box;
        }

        @media screen and (max-aspect-ratio: 4/3) {
            #orientation-warning {
                display: flex;
            }
            .game-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Upozornění pro hráče -->
    <div id="orientation-warning">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔄</div>
        Pro hraní otočte prosím mobil naležato.
    </div>

    <!-- Obalovací prvek, kterému skript uzamkne velikost -->
    <div class="game-container" id="lock-container">
        <canvas id="game" width="800" height="600"></canvas>
    </div>
        
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js" defer></script>
    <script src="game.js" defer></script>

    <script>
        // FUNKCE PRO ZAMČENÍ ROZMĚRŮ (ZABRÁNÍ PULZOVÁNÍ)
        function lockGameSize() {
            const container = document.getElementById('lock-container');
            if (!container) return;

            // Zjistíme absolutní reálnou velikost okna v pixelech při spuštění/otočení
            const startWidth = window.innerWidth;
            const startHeight = window.innerHeight;

            // Vnutíme tyto pevné pixely kontejneru. 
            // I když Duck schová lištu, kontejner zůstane absolutně nehybný.
            container.style.width = startWidth + "px";
            container.style.height = startHeight + "px";
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Zamkneme velikost hned při načtení
            lockGameSize();

            // Pokud hráč otočí mobil, přepočítáme a znovu zamkneme pevné pixely
            window.addEventListener('resize', lockGameSize);

            // Blokace posunu stránky na pozadí
            const canvas = document.getElementById('game');
            if (!canvas) return;

            const preventScroll = (e) => {
                if (e.touches.length > 0) {
                    e.preventDefault();
                }
            };

            canvas.addEventListener('touchstart', preventScroll, { passive: false });
            canvas.addEventListener('touchmove', preventScroll, { passive: false });
            canvas.addEventListener('touchend', preventScroll, { passive: false });
            document.body.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        });
    </script>
</body>
</html>
