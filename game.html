<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kdo nasbírá víc hub – JS verze</title>
    
    <style>
        /* 1. Nastavení celé stránky - fixuje ji proti posunu na mobilu */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            touch-action: none;
        }

        /* 2. Nastavení herního plátna */
               
        canvas {
            display: block;
            /* Na mobilu vyplní šířku, ale na PC nepřeleze 800px */
            width: 100vw;
            max-width: 800px; 
            
            /* Výška se dopočítá podle poměru stran, ale nepřeleze 600px na PC */
            height: auto;
            max-height: 600px;
            
            /* Klíč pro mobily: udrží poměr stran a zajistí, že uvidíš všechno */
            aspect-ratio: 800 / 600;
            object-fit: contain;

            background-color: #000;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

                
                
        
    </style>
</head>
<body>

    <!-- 3. Nejdříve načteme "mozek" hry (Knihovnu Kaboom) -->
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>
    
    <!-- 4. Potom načteme tvůj kód hry -->
    <script src="game.js"></script>

</body>
</html>
