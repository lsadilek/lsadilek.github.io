<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kdo nasbírá víc hub – JS verze</title>
    
    <style>
        /* 1. Nastavení celé stránky - fixuje ji proti posunu na mobilu */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            touch-action: none;
        }

        /* 2. Nastavení herního plátna */
        canvas {
            font-family: 'Arial', sans-serif;
            display: block;
            
            /* Zajišťuje, aby se hra na mobilu vešla celá a nedeformovala se */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            
            /* Zakazuje systémová gesta prohlížeče (aby prst ovládal jen hru) */
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;

            /* Tvůj okrasný rámeček */
            border: 8px solid #444;
            outline: 4px solid #000;
            box-shadow: 
                0 0 0 12px #333,
                0 20px 50px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <!-- 3. Nejdříve načteme "mozek" hry (Knihovnu Kaboom) -->
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>
    
    <!-- 4. Potom načteme tvůj kód hry -->
    <script src="game.js"></script>

</body>
</html>
