<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Kdo nasbírá víc hub – JS verze</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            touch-action: none;
        }

        #game-container {
            position: relative;
        }

        #game {
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="game"></canvas>
    </div>

    <!-- Kaboom -->
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>

    <!-- Dynamické přizpůsobení canvasu -->
    <script>
        const canvas = document.getElementById("game");
        const container = document.getElementById("game-container");

        function resizeCanvas() {
            const isPC = window.innerWidth > 900;

            if (isPC) {
                canvas.width = 800;
                canvas.height = 600;
                container.style.width = "800px";
                container.style.height = "600px";
                return;
            }

            const w = window.innerWidth;
            const h = window.innerHeight;
            const aspect = 4 / 3;
            let newW, newH;

            if (w < h) {
                newW = w;
                newH = w / aspect;
            } else {
                newH = h;
                newW = h * aspect;
            }

            canvas.width = newW;
            canvas.height = newH;
            container.style.width = newW + "px";
            container.style.height = newH + "px";
        }

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("orientationchange", resizeCanvas);
        resizeCanvas();
    </script>

    <!-- Tvoje hra -->
    <script src="game.js"></script>

</body>
</html>
