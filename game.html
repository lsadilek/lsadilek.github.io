<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kdo nasbírá víc hub – JS verze</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Fixace na reálnou i dynamickou výšku okna prohlížeče */
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Blokování systémového scrollování a odrážení stránek */
            touch-action: none;
            overscroll-behavior: none;
            font-family: sans-serif;
        }

        /* Canvas drží poměr 4:3 (800x600) a vyplní displej s černými okraji bez deformace */
        #game {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            aspect-ratio: 4 / 3;
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Upozornění na otočení telefonu */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            color: white;
            z-index: 9999;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 1.5rem;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Zobrazení varování, pokud je displej užší než herní poměr 4:3 (800x600) */
        @media screen and (max-aspect-ratio: 4/3) {
            #orientation-warning {
                display: flex;
            }
            #game {
                display: none;
            }
        }
    </style>
</head>
<!-- Atributy v body zabraňují prohlížeči zachytávat tahy prstem a vyvolávat kontextové menu -->
<body oncontextmenu="return false;" ontouchmove="if(event.touches.length > 1) { event.preventDefault(); }" style="touch-action: none;">

    <!-- Upozornění pro hráče -->
    <div id="orientation-warning">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔄</div>
        Pro hraní otočte prosím mobil naležato.
    </div>

    <canvas id="game" width="800" height="600"></canvas>
        
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js" defer></script>
    <script src="game.js" defer></script>
</body>
</html>
