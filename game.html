<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Kdo nasbírá víc hub – JS verze</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* Canvas má pevné rozměry, ale je vycentrovaný */
        #game {
            width: 100%;
            height: auto;
            max-width: 100vw;
            max-height: 100vh;
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>
    <canvas id="game" width="800" height="600"></canvas>

    <!-- Kaboom -->
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>

    <!-- Tvoje hra -->
    <script src="game.js"></script>
</body>
</html>
