<!DOCTYPE html>
<html lang="cs">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Kdo nasbírá víc hub – JS verze</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Zákaz scrollování a gest na úrovni těla */
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        canvas {
            font-family: 'Arial', sans-serif;
            /* Změna: zajistíme, aby se vždy vešla celá šířka */
            max-width: 100%;    /* Nesmí být širší než displej */
            height: auto;       /* Výška se dopočítá podle poměru stran */
            object-fit: contain;
            display: block;
            touch-action: none;
            
            /* OKRASNÝ RÁMEČEK */
            border: 8px solid #444;
            border-image: linear-gradient(to bottom, #666, #222) 1;
            outline: 4px solid #000;
            box-shadow: 
                0 0 0 12px #333,
                0 20px 50px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/kaboom@3000.0.0/dist/kaboom.js"></script>
    <script src="game.js"></script>
</body>
</html>
